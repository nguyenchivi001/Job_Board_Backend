<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<h2>New application received!</h2>
<p>A candidate has applied to your job posting.</p>
<br>
<p><strong>Job:</strong> <span th:text="${jobTitle}"></span></p>
<p><strong>Candidate:</strong> <span th:text="${candidateEmail}"></span></p>
<p><strong>Application ID:</strong> <span th:text="${applicationId}"></span></p>
<br>
<p>Log in to review the application.</p>
<br>
<p>— Job Board Team</p>
</body>
</html>
