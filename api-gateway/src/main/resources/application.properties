spring.application.name=api-gateway
server.port=8080

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# JWT
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

# Spring Cloud Gateway MVC Routes
spring.cloud.gateway.mvc.routes[0].id=auth-service
spring.cloud.gateway.mvc.routes[0].uri=http://localhost:8081
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.mvc.routes[1].id=job-service
spring.cloud.gateway.mvc.routes[1].uri=http://localhost:8082
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/api/jobs/**

spring.cloud.gateway.mvc.routes[2].id=application-service
spring.cloud.gateway.mvc.routes[2].uri=http://localhost:8083
spring.cloud.gateway.mvc.routes[2].predicates[0]=Path=/api/applications/**

spring.cloud.gateway.mvc.routes[3].id=profile-service
spring.cloud.gateway.mvc.routes[3].uri=http://localhost:8084
spring.cloud.gateway.mvc.routes[3].predicates[0]=Path=/api/profiles/**

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
